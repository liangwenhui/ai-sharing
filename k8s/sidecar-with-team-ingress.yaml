apiVersion: apps/v1
kind: Deployment
metadata:
  name: app-with-agent
  labels:
    app: app-with-agent
spec:
  replicas: 1
  selector:
    matchLabels:
      app: app-with-agent
  template:
    metadata:
      labels:
        app: app-with-agent
    spec:
      containers:
        - name: app
          image: your-app-image:latest
          ports:
            - containerPort: 8080
          env:
            - name: AGENT_BASE_URL
              value: http://127.0.0.1:8081
        - name: agent-service
          image: your-agent-image:latest
          ports:
            - containerPort: 8081
---
apiVersion: v1
kind: Service
metadata:
  name: app-with-agent-svc
spec:
  selector:
    app: app-with-agent
  ports:
    - name: web
      port: 80
      targetPort: 8080
    - name: agent
      port: 81
      targetPort: 8081
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: app-with-agent-ingress
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /$2
spec:
  ingressClassName: nginx
  rules:
    - host: demo.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: app-with-agent-svc
                port:
                  name: web
          - path: /team(/|$)(.*)
            pathType: ImplementationSpecific
            backend:
              service:
                name: app-with-agent-svc
                port:
                  name: agent
